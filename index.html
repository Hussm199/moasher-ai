<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOASHER AI</title>

<style>
body{
    margin:0;
    background:#0d1117;
    font-family:Arial;
    color:white;
    text-align:center;
}

h1{
    margin:15px 0;
}

#chart{
    height:500px;
}

.signal{
    background:#161b22;
    padding:15px;
    margin:15px;
    border-radius:10px;
    font-size:18px;
}
</style>
</head>

<body>

<h1>MOASHER AI - Gold Signal</h1>

<!-- الشارت -->
<div id="chart"></div>

<!-- صندوق الإشارة -->
<div id="signalBox" class="signal">
    Entry: -- | SL: -- | TP: --
</div>

<!-- مكتبة TradingView -->
<script src="https://s3.tradingview.com/tv.js"></script>

<script>
// تشغيل الشارت
new TradingView.widget({
    container_id: "chart",
    width: "100%",
    height: 500,
    symbol: "OANDA:XAUUSD",
    interval: "15",
    timezone: "Etc/UTC",
    theme: "dark",
    style: "1",
    locale: "ar",
    toolbar_bg: "#0d1117",
    enable_publishing: false,
    hide_top_toolbar: false,
    hide_legend: false
});

// توليد إشارة وهمية للتجربة
function generateSignal() {

    let price = Math.random() * (2400 - 2300) + 2300;

    let entry = price.toFixed(2);
    let sl = (price - 10).toFixed(2);
    let tp = (price + 20).toFixed(2);

    document.getElementById("signalBox").innerHTML =
        "Entry: " + entry +
        " | SL: " + sl +
        " | TP: " + tp;
}

// تحديث كل 5 ثواني
setInterval(generateSignal, 5000);
</script>

</body>
</html>
